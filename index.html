// Maya's full knowledge profile — used by the AI to generate contextually
// appropriate responses to whatever the interviewer asks
const MAYA_SYSTEM_PROMPT = `You are Maya Chen, Head of People Operations at Flowstack, a 200-person B2B SaaS company headquartered in Amsterdam. You are being interviewed by an AI compliance tool about how your team handles personal data.

YOUR CHARACTER:
You are friendly, cooperative, and intelligent, but you have zero legal training. You answer questions honestly and in good faith. You don't volunteer information unprompted — you answer what's asked. You occasionally mention real tools without realising their legal significance. You sometimes correct yourself mid-answer. You get mildly anxious when legal implications are pointed out, but stay cooperative.

YOUR KNOWLEDGE — answer questions drawing on these facts, but only reveal details when directly asked:

TEAM & SCOPE:
- You run the full employee lifecycle: hiring, onboarding, performance reviews, payroll coordination, offboarding
- Flowstack has about 200 employees
- Your HR team is about 6-7 people plus an HRIS administrator

SYSTEMS & VENDORS:
- Workday: main HR system (US-based). "Some kind of agreement" exists but you don't know the details
- Greenhouse: applicant tracking system (US-based, New York)
- Effy: 360-degree performance review tool — generates a score out of 10 per employee that feeds into bonus calculations. You think this is great and haven't considered legal implications
- ADP: payroll, syncs with Workday overnight (US-based). Procurement handles the contract
- Google Workspace: everything lives here, 2FA set up by IT
- Workplace Options: Employee Assistance Programme / mental health support (US-based). You're not sure what data flows to them
- Codility: technical screening for candidates — runs coding tests and gives a score. You recently set up a threshold where candidates below 40% are auto-rejected in Greenhouse without human review. Recruiters can override but rarely do. You think this saves time
- GoodTime: interview scheduling, connects to Google Calendar. You have no idea where they're based
- Radford (part of Korn Ferry): compensation benchmarking. You share salary data "anonymised" by department and seniority. Some departments have only 2-3 people

DATA YOU HOLD:
- Employee personal data: names, addresses, bank details, emergency contacts
- Disability and reasonable adjustments data (stored in Workday alongside normal HR data, not segregated)
- Sick leave records (dates and duration only, nothing clinical)
- Private medical insurance via Bupa — you share basic employee details for enrolment
- Ethnicity and gender identity for DEI reporting — optional fields in Workday onboarding form, with a note saying voluntary. No separate tick-box consent
- Performance scores (Effy), interview notes and CVs (Greenhouse), coding test scores (Codility)
- Summer interns aged 16-17 — same onboarding form as adults, same data collection, parent signature on internship agreement but not on data processing

RETENTION:
- Employees: keep everything during employment. After leaving: "try to clean things up but no hard rule, depends on the manager"
- Candidates not hired: keep CVs "maybe a year, sometimes longer if they were strong"
- No formal written retention policy

SECURITY:
- Google Workspace with 2FA for most systems
- Workday has access controls — only HR can see sensitive data
- No formal written access policy — "evolved organically"
- You assume Workday encrypts things but couldn't confirm
- Workday-ADP sync: you don't know how it works technically

LAWFUL BASIS:
- Main employment data: "because they're our employees, they signed a contract"
- Diversity data: not sure — "we started collecting it because investors asked for DEI metrics"
- Medical insurance: "part of the employment contract since it's a benefit"
- Candidates: "they applied for a job, we process their application, that seems obviously fine"

THINGS YOU DON'T KNOW:
- Whether DPAs with vendors are GDPR-specific
- Technical details of encryption or data transfers
- Where GoodTime is based
- What data exactly flows to Workplace Options
- The legal basis for diversity monitoring
- Whether any DPIA has ever been done
- Whether there is a DPO (you think "maybe legal handles it?")

RESPONSE STYLE:
- Keep answers conversational and natural — 2-5 sentences maximum
- Only answer what was directly asked
- Don't use legal terminology
- Occasionally say "I'm not sure" or "I'd have to check"
- If asked about something sensitive (like the auto-rejection threshold or minors), answer honestly but without flagging it as a problem yourself
- Never volunteer the curveballs (interns, newsletter) unless directly asked about those topics or unless the conversation has covered most other areas and it feels natural to add something
- Do NOT repeat information already given in the conversation
- Respond only with Maya's answer — no preamble, no "As Maya," just her words directly`;

let demoRunning = false;
let demoAborted = false;
let demoChatHistory = []; // separate history just for Maya's side of the conversation

// Generates Maya's response to the latest interviewer message
async function generateMayaResponse(interviewerMessage, retries = 3) {
  // Keep only the last 10 pairs of Maya's history to avoid oversized requests.
  // The system prompt already contains her full character — old turns add little value.
  const trimmedHistory = demoChatHistory.slice(-20).map(m => ({
    role: m.role,
    content: String(m.content).slice(0, 400) // cap each turn at 400 chars
  }));

  const messages = [
    ...trimmedHistory,
    { role: "user", content: interviewerMessage }
  ];

  let lastError;

  for (let attempt = 0; attempt <= retries; attempt++) {
    // Exponential backoff: 0s, 4s, 8s, 16s
    if (attempt > 0) {
      const backoff = attempt * 4000;
      if (testProgressLabel) testProgressLabel.textContent = `Maya rate-limited — retrying in ${backoff/1000}s…`;
      await new Promise(r => setTimeout(r, backoff));
    }

    let response;
    try {
      response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": anthropicApiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 300,
          system: MAYA_SYSTEM_PROMPT,
          messages: messages
        })
      });
    } catch(networkErr) {
      lastError = new Error("Network error reaching Maya API.");
      continue;
    }

    // Rate limited or overloaded — retry
    if (response.status === 429 || response.status === 529) {
      lastError = new Error(`Maya API rate limited (${response.status})`);
      continue;
    }

    if (!response.ok) {
      let errMsg = `Maya API error ${response.status}`;
      try {
        const errBody = await response.json();
        errMsg = errBody.error?.message || errMsg;
      } catch(_) { /* body wasn't JSON */ }
      throw new Error(errMsg); // non-retriable, throw immediately
    }

    let data;
    try {
      data = await response.json();
    } catch(e) {
      lastError = new Error("Maya API returned an unreadable response.");
      continue; // retry
    }

    if (!data.content || !data.content[0] || !data.content[0].text) {
      lastError = new Error("Maya API returned an unexpected response shape.");
      continue; // retry
    }

    const mayaText = data.content[0].text.trim();

    // Add this exchange to Maya's history — cap at 30 entries to prevent unbounded growth
    demoChatHistory.push({ role: "user", content: interviewerMessage });
    demoChatHistory.push({ role: "assistant", content: mayaText });
    if (demoChatHistory.length > 30) demoChatHistory = demoChatHistory.slice(-30);

    return mayaText; // success
  }

  throw lastError || new Error("Maya API call failed after multiple retries.");
}

async function runSelfTest() {
  if (demoRunning) return;
  demoRunning = true;
  demoAborted = false;
  demoChatHistory = []; // reset Maya's memory

  selfTestBtn.disabled = true;
  selfTestProgress.classList.add('visible');
  testProgressFill.style.width = '0%';
  testProgressLabel.textContent = 'Maya is thinking…';

  // The demo runs as a live conversation loop:
  // get last interviewer message → generate Maya response → send it → repeat
  // We stop when interviewComplete is true or we hit a max turn limit
  const MAX_TURNS = 20;
  let turn = 0;

  while (!demoAborted && turn < MAX_TURNS) {
    turn++;
    const pct = Math.min(Math.round((turn / MAX_TURNS) * 100), 95);
    testProgressFill.style.width = pct + '%';
    testProgressLabel.textContent = `Turn ${turn} — Maya responding…`;

    // Get the last thing the interviewer said (plain text, no JSON)
    const lastInterviewerMsg = getLastInterviewerMessage();
    if (!lastInterviewerMsg) break;

    let mayaAnswer;
    try {
      mayaAnswer = await generateMayaResponse(lastInterviewerMsg);
    } catch(err) {
      console.error("Maya generation error:", err);
      appendMessage('ai', "— Demo paused: could not generate response. You can continue manually.");
      break;
    }

    if (demoAborted) break;

    // Type Maya's answer into the input box
    chatInput.disabled = false;
    chatInput.value = '';
    await typeIntoInput(mayaAnswer);

    if (demoAborted) break;

    await delay(400);

    if (demoAborted) break;

    // Send it through the real RoPA Whisperer pipeline
    await sendMessageText(mayaAnswer);

    if (demoAborted) break;

    // Stop if the interview is flagged complete
    if (ropaState.interviewComplete) break;

    // Pause so the user can read
    await delay(3000);
  }

  demoRunning = false;
  testProgressFill.style.width = '100%';
  testProgressLabel.textContent = demoAborted ? 'Stopped' : 'Interview done — exploring topics…';

  // Launch topic picker then drive the full topic phase automatically
  if (!demoAborted) {
    const greenCount = countGreenFields();
    if (greenCount >= 6 || ropaState.interviewComplete) {
      // Skip the interim prompt in demo mode — go straight to topic picker
      interimPromptShown = true;
      hideInterimPrompt();
      if (!topicPickerLaunched) {
        topicPickerLaunched = true;
        await startTopicPickerFlow();
      }
      if (!demoAborted) {
        await demoTopicLoop();
      }
    }
  }

  setTimeout(() => {
    selfTestProgress.classList.remove('visible');
    selfTestBtn.disabled = false;
    selfTestBtn.innerHTML = '<span class="test-icon">↺</span> Re-run Demo';
  }, 1500);
}

// ── Demo topic phase: auto-selects chips, answers clarifying questions,
//    responds to wrap-ups, then generates the final report ──────────────
async function demoTopicLoop() {
  if (demoAborted) return;

  // Pick at most 2 topics for the demo — prefer HIGH risk ones
  const MAX_DEMO_TOPICS = 2;
  let topicsExplored = 0;

  while (!demoAborted && topicsExplored < MAX_DEMO_TOPICS) {

    // Wait until we're in 'picking' phase (chips visible)
    const gotPicking = await waitForTopicPhase('picking', 8000);
    if (!gotPicking || demoAborted) break;

    // Brief pause so the user can see the chips before the demo auto-picks one
    await delay(2500);

    // Find the first un-discussed HIGH risk topic, fall back to any remaining
    const remaining = topicState.remainingTopics.filter(
      k => !topicState.discussedTopics.has(k)
    );
    if (remaining.length === 0) break;

    const preferred = remaining.find(k => {
      const t = GDPR_TOPICS.find(t => t.key === k);
      return t && t.riskLevel === 'high';
    }) || remaining[0];

    testProgressLabel.textContent = `Exploring topic: ${GDPR_TOPICS.find(t=>t.key===preferred)?.label}…`;

    // Create a ghost chip element so selectTopic can mark it selected
    const ghostChip = document.createElement('button');
    ghostChip.className = 'topic-chip high-risk selected';

    // Visually highlight the matching real chip if it exists
    const realChip = [...topicChipsEl.querySelectorAll('.topic-chip')]
      .find(c => c.textContent.trim() === GDPR_TOPICS.find(t=>t.key===preferred)?.label);
    if (realChip) {
      topicChipsEl.querySelectorAll('.topic-chip').forEach(c => c.classList.remove('selected'));
      realChip.classList.add('selected');
    }

    await delay(800);

    // Fire selectTopic — this injects the system instruction and asks Q1
    await selectTopic(preferred, realChip || ghostChip);

    if (demoAborted) break;
    await delay(2500);

    // ── Clarifying Q1 ──
    testProgressLabel.textContent = `Maya answering Q1 on topic…`;
    const q1 = getLastInterviewerMessage();
    if (!q1) break;

    let a1;
    try { a1 = await generateMayaResponse(q1); }
    catch(e) { console.error(e); break; }

    if (demoAborted) break;
    chatInput.disabled = false;
    await typeIntoInput(a1);
    await delay(400);
    await sendMessageText(a1);
    if (demoAborted) break;
    await delay(2500);

    // ── Clarifying Q2 ──
    testProgressLabel.textContent = `Maya answering Q2 on topic…`;
    const q2 = getLastInterviewerMessage();
    if (!q2) break;

    let a2;
    try { a2 = await generateMayaResponse(q2); }
    catch(e) { console.error(e); break; }

    if (demoAborted) break;
    chatInput.disabled = false;
    await typeIntoInput(a2);
    await delay(400);
    // This triggers advanceTopicPhase → count=2 → wrap-up API call → chips re-render
    await sendMessageText(a2);
    if (demoAborted) break;

    // Wait for the wrap-up question and chip re-render (600ms setTimeout inside advanceTopicPhase)
    await delay(3500);

    topicsExplored++;

    // ── Wrap-up answer: "anything else?" ──
    const wrapQ = getLastInterviewerMessage();
    if (!wrapQ) break;

    testProgressLabel.textContent = `Maya answering wrap-up…`;

    let wrapA;
    try { wrapA = await generateMayaResponse(wrapQ); }
    catch(e) { console.error(e); break; }

    if (demoAborted) break;
    chatInput.disabled = false;
    await typeIntoInput(wrapA);
    await delay(400);
    await sendMessageText(wrapA);
    if (demoAborted) break;
    await delay(2500);
  }

  if (!demoAborted) {
    // Auto-generate the final report
    testProgressLabel.textContent = 'Generating final report…';
    await delay(1000);
    await generateReport();
  }
}

// Polls topicState.phase until it matches targetPhase or timeout expires
function waitForTopicPhase(targetPhase, timeoutMs) {
  return new Promise(resolve => {
    const start = Date.now();
    const check = () => {
      if (topicState.phase === targetPhase) return resolve(true);
      if (Date.now() - start > timeoutMs) return resolve(false);
      setTimeout(check, 150);
    };
    check();
  });
}


// Extracts the plain-text content of the last interviewer (AI) message
// from the conversation history, stripping the JSON block
function getLastInterviewerMessage() {
  for (let i = ropaState.conversationHistory.length - 1; i >= 0; i--) {
    const msg = ropaState.conversationHistory[i];
    if (msg.role === 'assistant') {
      return msg.content.split('|||JSON|||')[0].trim();
    }
  }
  return null;
}

// Simulates typing into the input box character by character
async function typeIntoInput(text) {
  chatInput.value = '';
  chatInput.style.height = 'auto';
  for (let i = 0; i < text.length; i++) {
    if (demoAborted) return;
    chatInput.value += text[i];
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    await delay(10 + Math.random() * 15);
  }
}

// Sends a specific text string through the full real pipeline
async function sendMessageText(text) {
  chatInput.value = '';
  chatInput.style.height = 'auto';
  setInputEnabled(false);

  appendMessage('user', text);
  showTyping(true);

  ropaState.conversationHistory.push({ role: "user", content: text });

  try {
    const raw = await callClaude(ropaState.conversationHistory);
    const { chatText, jsonData } = parseResponse(raw);

    ropaState.conversationHistory.push({ role: "assistant", content: raw });

    showTyping(false);
    appendMessage('ai', chatText);

    const updatedKeys = applyJsonUpdate(jsonData);
    renderRopaFields(updatedKeys);
    renderRiskFlags();
    updateReportButton();

    if (topicState.phase === 'clarifying') {
      await advanceTopicPhase();
      return;
    }

  } catch(err) {
    showTyping(false);
    appendMessage('ai', "Sorry, I lost my train of thought — moving on.");
    console.error("Demo API error:", err);
    ropaState.conversationHistory.pop();
  }

  setInputEnabled(true);
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

selfTestBtn.addEventListener('click', runSelfTest);

stopTestBtn.addEventListener('click', () => {
  demoAborted = true;
  demoRunning = false;
  setInputEnabled(true);
  showTyping(false);
});



chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

riskToggle.addEventListener('click', () => {
  riskFlagsList.classList.toggle('open');
  riskChevron.classList.toggle('open');
});

reportBtn.addEventListener('click', generateReport);

newInterviewBtn.addEventListener('click', () => {
  if (!confirm('Start a new interview? This will clear all current data.')) return;
  chatMessages.innerHTML = '';
  resetState();
  renderRopaFields();
  renderRiskFlags();
  riskFlagsList.classList.remove('open');
  riskChevron.classList.remove('open');
  reportBtn.disabled = true;
  reportBtn.classList.remove('ready');
  topicPicker.classList.remove('visible');
  topicChipsEl.innerHTML = '';
  // Reset demo state
  demoRunning = false;
  demoAborted = true;
  selfTestProgress.classList.remove('visible');
  selfTestBtn.innerHTML = '<span class="test-icon">▶</span> Run Demo';
  selfTestBtn.disabled = !anthropicApiKey;
  init();
});

modalClose.addEventListener('click', () => modalOverlay.classList.remove('visible'));
modalCloseFoot.addEventListener('click', () => modalOverlay.classList.remove('visible'));
modalOverlay.addEventListener('click', e => {
  if (e.target === modalOverlay) modalOverlay.classList.remove('visible');
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

function init() {
  // Add opening message to chat (no API call needed — it's fixed)
  appendMessage('ai', OPENING_MESSAGE);

  // Seed conversation history so Claude has context
  ropaState.conversationHistory.push({
    role: "assistant",
    content: OPENING_MESSAGE + "\n\n|||JSON|||\n{\"fieldsUpdated\":{},\"newRiskFlags\":[],\"interviewComplete\":false}\n|||JSON|||END"
  });

  setInputEnabled(true);
  chatInput.focus();
}

// Boot — render the empty RoPA panel immediately,
// but wait for the API key to be confirmed before starting the interview
renderRopaFields();
renderRiskFlags();
// init() is called by confirmApiKey() once the key is set
</script>
